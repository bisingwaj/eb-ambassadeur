  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"362e33f7-7b3e-4b0f-90f6-40826518b9f0\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  @font-face{font-family:'BricolageXB';src:url(\"b5534c02-0b59-47d0-b52a-363eb317b764\") format('truetype');font-weight:800}\n  @font-face{font-family:'BricolageSB';src:url(\"95afd50d-ee4a-474a-aba2-7435952b4a41\") format('truetype');font-weight:600}\n  @font-face{font-family:'Gotham';src:url(\"bb538e5b-8967-4d97-8ac8-6a50e25ed1e2\") format('opentype');font-weight:500}\n  body{margin:0;background:#050F26}\n  a{color:#4DA3FF}a:hover{color:#7FA8D9}\n  input:focus,select:focus,textarea:focus{outline:none;border-color:#4DA3FF!important}\n  input::placeholder,textarea::placeholder{color:rgba(127,168,217,.5)}\n  select option{background:#0A2452;color:#FBFDFF}\n  button{-webkit-tap-highlight-color:transparent}\n  @media print{\n    body{background:#fff}\n    [data-app]{display:none!important}\n    [data-pdf]{display:block!important}\n    @page{size:A4;margin:0}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-app=\"true\" style=\"min-height:100dvh;display:flex;flex-direction:column;font-family:'Gotham',sans-serif;color:#FBFDFF\">\n\n  <!-- ═══ ACCUEIL ═══ -->\n  <sc-if value=\"{{ isWelcome }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"Accueil\" style=\"position:relative;min-height:100dvh;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;background:radial-gradient(130% 100% at 75% 0%, #123C7E 0%, #0A2452 42%, #050F26 82%)\">\n      <svg width=\"420\" height=\"420\" viewBox=\"0 0 100 100\" style=\"position:absolute;right:-120px;top:-90px;opacity:.07\"><polygon points=\"50,5 61.8,38.2 96.6,38.2 68.4,58.8 79.4,92 50,71.4 20.6,92 31.6,58.8 3.4,38.2 38.2,38.2\" fill=\"#4DA3FF\"><\u002Fpolygon><\u002Fsvg>\n      <div style=\"position:relative;display:flex;flex-direction:column;gap:20px;padding:32px 24px 40px;max-width:560px;margin:0 auto;width:100%;box-sizing:border-box\">\n        <div style=\"display:flex;align-items:center;gap:12px\">\n          <svg width=\"34\" height=\"34\" viewBox=\"0 0 100 100\"><polygon points=\"50,5 61.8,38.2 96.6,38.2 68.4,58.8 79.4,92 50,71.4 20.6,92 31.6,58.8 3.4,38.2 38.2,38.2\" fill=\"#4DA3FF\"><\u002Fpolygon><\u002Fsvg>\n          <div style=\"font-family:'BricolageSB',sans-serif;font-size:20px\">Étoile Bleue<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;letter-spacing:.26em;color:#4DA3FF\">CANDIDATURE · {{ cohorteUpper }}<\u002Fdiv>\n        <div style=\"font-family:'BricolageXB',sans-serif;font-size:clamp(34px,9vw,46px);line-height:1.05;letter-spacing:-.01em\">Deviens Ambassadeur <span style=\"color:#4DA3FF\">Communautaire<\u002Fspan>.<\u002Fdiv>\n        <div style=\"font-size:15px;line-height:1.65;color:#C9D8EE;text-wrap:pretty\">Créateur de contenu, communicant, mobilisateur&nbsp;: rejoins la coordination opérationnelle d'Étoile Bleue et rends les secours possibles près de chez toi.<\u002Fdiv>\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n          <div style=\"border:1px solid rgba(127,168,217,.35);border-radius:999px;padding:8px 14px;font-size:12px;letter-spacing:.08em;color:#7FA8D9\">6 ÉTAPES<\u002Fdiv>\n          <div style=\"border:1px solid rgba(127,168,217,.35);border-radius:999px;padding:8px 14px;font-size:12px;letter-spacing:.08em;color:#7FA8D9\">± 5 MINUTES<\u002Fdiv>\n          <div style=\"border:1px solid rgba(127,168,217,.35);border-radius:999px;padding:8px 14px;font-size:12px;letter-spacing:.08em;color:#7FA8D9\">KINSHASA<\u002Fdiv>\n        <\u002Fdiv>\n        <button type=\"button\" onclick=\"{{ start }}\" style=\"width:100%;min-height:56px;background:#FBFDFF;color:#0A2452;border:0;border-radius:999px;font-family:'Gotham',sans-serif;font-size:14px;letter-spacing:.12em;font-weight:700;cursor:pointer;margin-top:8px\">{{ startLabel }}<\u002Fbutton>\n        <div style=\"font-size:12px;color:#7FA8D9;text-align:center\">Tes réponses sont enregistrées sur cet appareil — tu peux reprendre plus tard.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ═══ EN-TÊTE + PROGRESSION ═══ -->\n  <sc-if value=\"{{ inForm }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:sticky;top:0;z-index:10;background:rgba(5,15,38,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(127,168,217,.15)\">\n      <div style=\"max-width:560px;margin:0 auto;padding:14px 24px 12px;display:flex;flex-direction:column;gap:10px;box-sizing:border-box\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div style=\"display:flex;align-items:center;gap:9px\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 100 100\"><polygon points=\"50,5 61.8,38.2 96.6,38.2 68.4,58.8 79.4,92 50,71.4 20.6,92 31.6,58.8 3.4,38.2 38.2,38.2\" fill=\"#4DA3FF\"><\u002Fpolygon><\u002Fsvg>\n            <div style=\"font-family:'BricolageSB',sans-serif;font-size:15px\">Étoile Bleue<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:12px;letter-spacing:.16em;color:#7FA8D9\">{{ stepLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:3px;border-radius:2px;background:rgba(127,168,217,.2);overflow:hidden\"><div style=\"{{ barStyle }}\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"flex:1;width:100%;max-width:560px;margin:0 auto;box-sizing:border-box;padding:0 24px\">\n\n    <!-- ═══ 1 · IDENTITÉ ═══ -->\n    <sc-if value=\"{{ is1 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Étape 1 Identité\" style=\"display:flex;flex-direction:column;gap:28px;padding:32px 0 24px\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-size:12px;letter-spacing:.24em;color:#4DA3FF\">01 · IDENTITÉ<\u002Fdiv>\n          <div style=\"font-family:'BricolageXB',sans-serif;font-size:30px;line-height:1.1\">Qui es-tu&nbsp;?<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-req=\"nom\" style=\"display:flex;flex-direction:column;gap:8px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">NOM COMPLET *<\u002Flabel>\n          <input data-field=\"nom\" value=\"{{ v_nom }}\" onchange=\"{{ onField }}\" autocomplete=\"name\" placeholder=\"Prénom et nom\" style=\"width:100%;box-sizing:border-box;background:transparent;border:0;border-bottom:2px solid rgba(127,168,217,.35);padding:12px 0;font-family:'Gotham',sans-serif;font-size:18px;color:#FBFDFF\">\n          <sc-if value=\"{{ err_nom }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#F2A6A0\">Indique ton nom complet.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div data-req=\"age\" style=\"display:flex;flex-direction:column;gap:12px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">TON ÂGE *<\u002Flabel>\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n            <sc-for list=\"{{ ageOpts }}\" as=\"o\" hint-placeholder-count=\"6\">\n              <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ err_age }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#F2A6A0\">Sélectionne ta tranche d'âge.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div data-req=\"tel\" style=\"display:flex;flex-direction:column;gap:8px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">NUMÉRO WHATSAPP *<\u002Flabel>\n          <input data-field=\"tel\" value=\"{{ v_tel }}\" onchange=\"{{ onField }}\" inputmode=\"tel\" autocomplete=\"tel\" placeholder=\"+243 8XX XXX XXX\" style=\"width:100%;box-sizing:border-box;background:transparent;border:0;border-bottom:2px solid rgba(127,168,217,.35);padding:12px 0;font-family:'Gotham',sans-serif;font-size:18px;color:#FBFDFF\">\n          <sc-if value=\"{{ err_tel }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#F2A6A0\">Indique un numéro WhatsApp valide (au moins 9 chiffres).<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">EMAIL <span style=\"letter-spacing:.05em;color:rgba(127,168,217,.6)\">(optionnel)<\u002Fspan><\u002Flabel>\n          <input data-field=\"email\" value=\"{{ v_email }}\" onchange=\"{{ onField }}\" inputmode=\"email\" autocomplete=\"email\" placeholder=\"toi@exemple.cd\" style=\"width:100%;box-sizing:border-box;background:transparent;border:0;border-bottom:2px solid rgba(127,168,217,.35);padding:12px 0;font-family:'Gotham',sans-serif;font-size:18px;color:#FBFDFF\">\n          <sc-if value=\"{{ err_email }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#F2A6A0\">Cet email ne semble pas valide.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div data-req=\"commune\" style=\"display:flex;flex-direction:column;gap:8px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">TA COMMUNE DE RÉSIDENCE *<\u002Flabel>\n          <select data-field=\"commune\" value=\"{{ v_commune }}\" onchange=\"{{ onField }}\" style=\"width:100%;box-sizing:border-box;background:transparent;border:0;border-bottom:2px solid rgba(127,168,217,.35);padding:12px 0;font-family:'Gotham',sans-serif;font-size:18px;color:#FBFDFF;appearance:none;-webkit-appearance:none;background-image:linear-gradient(45deg,transparent 50%,#4DA3FF 50%),linear-gradient(135deg,#4DA3FF 50%,transparent 50%);background-position:calc(100% - 16px) 55%,calc(100% - 10px) 55%;background-size:6px 6px;background-repeat:no-repeat\">{{ communeOptions }}<\u002Fselect>\n          <sc-if value=\"{{ err_commune }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#F2A6A0\">Choisis ta commune.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div data-req=\"langues\" style=\"display:flex;flex-direction:column;gap:12px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">LANGUES PARLÉES * <span style=\"letter-spacing:.05em;color:rgba(127,168,217,.6)\">(plusieurs choix)<\u002Fspan><\u002Flabel>\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n            <sc-for list=\"{{ langueOpts }}\" as=\"o\" hint-placeholder-count=\"6\">\n              <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ err_langues }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#F2A6A0\">Sélectionne au moins une langue.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══ 2 · PROFIL & RÉSEAUX ═══ -->\n    <sc-if value=\"{{ is2 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Étape 2 Profil\" style=\"display:flex;flex-direction:column;gap:28px;padding:32px 0 24px\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-size:12px;letter-spacing:.24em;color:#4DA3FF\">02 · PROFIL &amp; RÉSEAUX<\u002Fdiv>\n          <div style=\"font-family:'BricolageXB',sans-serif;font-size:30px;line-height:1.1\">Ce que tu fais aujourd'hui.<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-req=\"statut\" style=\"display:flex;flex-direction:column;gap:12px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">TA SITUATION ACTUELLE *<\u002Flabel>\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n            <sc-for list=\"{{ statutOpts }}\" as=\"o\" hint-placeholder-count=\"4\">\n              <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ err_statut }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#F2A6A0\">Indique ta situation actuelle.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">DOMAINE D'ÉTUDES OU D'ACTIVITÉ <span style=\"letter-spacing:.05em;color:rgba(127,168,217,.6)\">(optionnel)<\u002Fspan><\u002Flabel>\n          <input data-field=\"activite\" value=\"{{ v_activite }}\" onchange=\"{{ onField }}\" placeholder=\"Ex. communication, médecine, design…\" style=\"width:100%;box-sizing:border-box;background:transparent;border:0;border-bottom:2px solid rgba(127,168,217,.35);padding:12px 0;font-family:'Gotham',sans-serif;font-size:18px;color:#FBFDFF\">\n        <\u002Fdiv>\n        <div data-req=\"reseaux\" style=\"display:flex;flex-direction:column;gap:12px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">RÉSEAUX SOCIAUX QUE TU UTILISES * <span style=\"letter-spacing:.05em;color:rgba(127,168,217,.6)\">(plusieurs choix)<\u002Fspan><\u002Flabel>\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n            <sc-for list=\"{{ reseauOpts }}\" as=\"o\" hint-placeholder-count=\"8\">\n              <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ err_reseaux }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#F2A6A0\">Sélectionne au moins un réseau social.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasPseudos }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;gap:16px;border-top:1px solid rgba(127,168,217,.15);padding-top:20px\">\n            <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">TES PSEUDOS SUR CES RÉSEAUX <span style=\"letter-spacing:.05em;color:rgba(127,168,217,.6)\">(optionnel)<\u002Fspan><\u002Flabel>\n            <sc-for list=\"{{ pseudoRows }}\" as=\"p\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex;align-items:center;gap:14px\">\n                <div style=\"width:96px;flex-shrink:0;font-size:13px;color:#C9D8EE\">{{ p.label }}<\u002Fdiv>\n                <input data-field=\"{{ p.field }}\" value=\"{{ p.value }}\" onchange=\"{{ onPseudo }}\" placeholder=\"@pseudo\" style=\"flex:1;min-width:0;box-sizing:border-box;background:transparent;border:0;border-bottom:2px solid rgba(127,168,217,.35);padding:10px 0;font-family:'Gotham',sans-serif;font-size:16px;color:#FBFDFF\">\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══ 3 · DISPONIBILITÉ ═══ -->\n    <sc-if value=\"{{ is3 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Étape 3 Disponibilité\" style=\"display:flex;flex-direction:column;gap:28px;padding:32px 0 24px\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-size:12px;letter-spacing:.24em;color:#4DA3FF\">03 · DISPONIBILITÉ<\u002Fdiv>\n          <div style=\"font-family:'BricolageXB',sans-serif;font-size:30px;line-height:1.1\">Ton temps pour la mission.<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-req=\"jours\" style=\"display:flex;flex-direction:column;gap:12px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">JOURS DISPONIBLES PAR SEMAINE *<\u002Flabel>\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n            <sc-for list=\"{{ jourOpts }}\" as=\"o\" hint-placeholder-count=\"7\">\n              <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-size:13px;color:#7FA8D9\">{{ jourHint }}<\u002Fdiv>\n          <sc-if value=\"{{ err_jours }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#F2A6A0\">Indique tes jours disponibles.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div data-req=\"weekend\" style=\"display:flex;flex-direction:column;gap:12px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">PEUX-TU TRAVAILLER LES WEEK-ENDS&nbsp;? *<\u002Flabel>\n          <div style=\"display:flex;gap:10px\">\n            <sc-for list=\"{{ weekendOpts }}\" as=\"o\" hint-placeholder-count=\"2\">\n              <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ err_weekend }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#F2A6A0\">Réponds pour les week-ends.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div data-req=\"nuit\" style=\"display:flex;flex-direction:column;gap:12px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">PEUX-TU TRAVAILLER LA NUIT&nbsp;? *<\u002Flabel>\n          <div style=\"display:flex;gap:10px\">\n            <sc-for list=\"{{ nuitOpts }}\" as=\"o\" hint-placeholder-count=\"2\">\n              <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ err_nuit }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#F2A6A0\">Réponds pour la nuit.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══ 4 · CONTRIBUTION ═══ -->\n    <sc-if value=\"{{ is4 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Étape 4 Contribution\" style=\"display:flex;flex-direction:column;gap:28px;padding:32px 0 24px\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-size:12px;letter-spacing:.24em;color:#4DA3FF\">04 · CONTRIBUTION<\u002Fdiv>\n          <div style=\"font-family:'BricolageXB',sans-serif;font-size:30px;line-height:1.1\">Dans quoi peux-tu appuyer le projet&nbsp;?<\u002Fdiv>\n          <div style=\"font-size:14px;line-height:1.6;color:#C9D8EE\">Choisis tous les domaines où tu peux apporter quelque chose.<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-req=\"domaines\" style=\"display:flex;flex-direction:column;gap:12px\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n            <sc-for list=\"{{ domaineOpts }}\" as=\"o\" hint-placeholder-count=\"10\">\n              <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ err_domaines }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#F2A6A0\">Choisis au moins un domaine d'appui.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">TES IDÉES POUR LA COORDINATION OPÉRATIONNELLE <span style=\"letter-spacing:.05em;color:rgba(127,168,217,.6)\">(optionnel)<\u002Fspan><\u002Flabel>\n          <textarea data-field=\"idees\" value=\"{{ v_idees }}\" onchange=\"{{ onField }}\" rows=\"5\" placeholder=\"Propose des idées concrètes : actions, formats de contenu, façons de mobiliser ta commune…\" style=\"width:100%;box-sizing:border-box;background:rgba(255,255,255,.04);border:1px solid rgba(127,168,217,.3);border-radius:14px;padding:16px;font-family:'Gotham',sans-serif;font-size:16px;line-height:1.6;color:#FBFDFF;resize:vertical\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══ 5 · RÉMUNÉRATION & MOTIVATION ═══ -->\n    <sc-if value=\"{{ is5 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Étape 5 Rémunération\" style=\"display:flex;flex-direction:column;gap:28px;padding:32px 0 24px\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-size:12px;letter-spacing:.24em;color:#4DA3FF\">05 · RÉMUNÉRATION &amp; MOTIVATION<\u002Fdiv>\n          <div style=\"font-family:'BricolageXB',sans-serif;font-size:30px;line-height:1.1\">Parlons franchement.<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-req=\"remun\" style=\"display:flex;flex-direction:column;gap:12px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">SOUHAITES-TU ÊTRE RÉMUNÉRÉ(E)&nbsp;? *<\u002Flabel>\n          <div style=\"display:flex;gap:10px\">\n            <sc-for list=\"{{ remunOpts }}\" as=\"o\" hint-placeholder-count=\"2\">\n              <button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ err_remun }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#F2A6A0\">Réponds à la question de rémunération.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showMontant }}\" hint-placeholder-val=\"{{ false }}\">\n          <div data-req=\"montant\" style=\"display:flex;flex-direction:column;gap:8px\">\n            <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">TES PRÉTENTIONS (USD / MOIS) *<\u002Flabel>\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <div style=\"font-family:'BricolageSB',sans-serif;font-size:22px;color:#4DA3FF\">$<\u002Fdiv>\n              <input data-field=\"montant\" value=\"{{ v_montant }}\" onchange=\"{{ onField }}\" inputmode=\"numeric\" placeholder=\"Montant mensuel en chiffres\" style=\"flex:1;min-width:0;box-sizing:border-box;background:transparent;border:0;border-bottom:2px solid rgba(127,168,217,.35);padding:12px 0;font-family:'Gotham',sans-serif;font-size:18px;color:#FBFDFF\">\n            <\u002Fdiv>\n            <sc-if value=\"{{ err_montant }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#F2A6A0\">Indique un montant en chiffres.<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <label style=\"font-size:12px;letter-spacing:.18em;color:#7FA8D9\">POURQUOI VEUX-TU REJOINDRE ÉTOILE BLEUE&nbsp;? <span style=\"letter-spacing:.05em;color:rgba(127,168,217,.6)\">(optionnel)<\u002Fspan><\u002Flabel>\n          <textarea data-field=\"motivation\" value=\"{{ v_motivation }}\" onchange=\"{{ onField }}\" rows=\"5\" placeholder=\"Quelques phrases suffisent.\" style=\"width:100%;box-sizing:border-box;background:rgba(255,255,255,.04);border:1px solid rgba(127,168,217,.3);border-radius:14px;padding:16px;font-family:'Gotham',sans-serif;font-size:16px;line-height:1.6;color:#FBFDFF;resize:vertical\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══ 6 · RÉCAPITULATIF ═══ -->\n    <sc-if value=\"{{ is6 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Étape 6 Récapitulatif\" style=\"display:flex;flex-direction:column;gap:24px;padding:32px 0 24px\">\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-size:12px;letter-spacing:.24em;color:#4DA3FF\">06 · RÉCAPITULATIF<\u002Fdiv>\n          <div style=\"font-family:'BricolageXB',sans-serif;font-size:30px;line-height:1.1\">Vérifie, puis envoie.<\u002Fdiv>\n          <div style=\"font-size:13px;color:#7FA8D9\">Référence de ta candidature&nbsp;: <span style=\"color:#FBFDFF\">{{ refNum }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ recapSections }}\" as=\"sec\" hint-placeholder-count=\"5\">\n          <div style=\"border:1px solid rgba(127,168,217,.2);border-radius:16px;padding:18px 18px 6px;display:flex;flex-direction:column\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid rgba(127,168,217,.15)\">\n              <div style=\"font-size:11px;letter-spacing:.2em;color:#4DA3FF\">{{ sec.titre }}<\u002Fdiv>\n              <button type=\"button\" onclick=\"{{ sec.onEdit }}\" style=\"background:none;border:0;color:#7FA8D9;font-family:'Gotham',sans-serif;font-size:12px;letter-spacing:.08em;cursor:pointer;padding:4px 0;text-decoration:underline\">Modifier<\u002Fbutton>\n            <\u002Fdiv>\n            <sc-for list=\"{{ sec.rows }}\" as=\"r\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;gap:14px;padding:11px 0;border-bottom:1px solid rgba(127,168,217,.08)\">\n                <div style=\"width:110px;flex-shrink:0;font-size:12px;letter-spacing:.06em;color:#7FA8D9;padding-top:1px\">{{ r.k }}<\u002Fdiv>\n                <div style=\"flex:1;font-size:14px;line-height:1.5;color:#FBFDFF;overflow-wrap:anywhere\">{{ r.v }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"display:flex;flex-direction:column;gap:12px;background:rgba(28,95,176,.14);border:1px solid rgba(77,163,255,.3);border-radius:16px;padding:20px\">\n          <div style=\"font-family:'BricolageSB',sans-serif;font-size:18px\">Dernière étape<\u002Fdiv>\n          <div style=\"font-size:14px;line-height:1.6;color:#C9D8EE\">1. Télécharge ta fiche de candidature en PDF.<br>2. Envoie-la à l'équipe Étoile Bleue sur WhatsApp&nbsp;: <span style=\"color:#FBFDFF;white-space:nowrap\">{{ waDisplay }}<\u002Fspan><\u002Fdiv>\n          <button type=\"button\" onclick=\"{{ doPrint }}\" style=\"width:100%;min-height:56px;background:#FBFDFF;color:#0A2452;border:0;border-radius:999px;font-family:'Gotham',sans-serif;font-size:14px;letter-spacing:.1em;font-weight:700;cursor:pointer\">TÉLÉCHARGER MA FICHE (PDF)<\u002Fbutton>\n          <a href=\"{{ waHref }}\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;justify-content:center;width:100%;min-height:56px;background:transparent;color:#FBFDFF;border:2px solid #4DA3FF;border-radius:999px;font-size:14px;letter-spacing:.1em;font-weight:700;text-decoration:none;box-sizing:border-box\">ENVOYER SUR WHATSAPP<\u002Fa>\n          <div style=\"font-size:12px;line-height:1.5;color:#7FA8D9\">Dans la fenêtre d'impression, choisis «&nbsp;Enregistrer en PDF&nbsp;», puis joins le fichier à ton message WhatsApp.<\u002Fdiv>\n        <\u002Fdiv>\n        <button type=\"button\" onclick=\"{{ resetAll }}\" style=\"background:none;border:0;color:rgba(127,168,217,.7);font-family:'Gotham',sans-serif;font-size:12px;letter-spacing:.08em;cursor:pointer;padding:10px;text-decoration:underline\">Effacer mes réponses et recommencer<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ═══ NAVIGATION ═══ -->\n    <sc-if value=\"{{ showNav }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:10px;padding:8px 0 40px\">\n        <sc-if value=\"{{ hasError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:13px;line-height:1.5;color:#F2A6A0;text-align:center\">Corrige les champs signalés en rouge ci-dessus.<\u002Fdiv>\n        <\u002Fsc-if>\n        <button type=\"button\" onclick=\"{{ next }}\" style=\"{{ nextStyle }}\">{{ nextLabel }}<\u002Fbutton>\n        <button type=\"button\" onclick=\"{{ back }}\" style=\"background:none;border:0;color:#7FA8D9;font-family:'Gotham',sans-serif;font-size:13px;letter-spacing:.1em;cursor:pointer;padding:12px;text-decoration:underline\">RETOUR<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ═══ FICHE PDF (visible uniquement à l'impression) ═══ -->\n<div data-pdf=\"true\" style=\"display:none;width:794px;min-height:1080px;margin:0 auto;background:#FFFFFF;font-family:'Gotham',sans-serif;color:#0A2452\">\n  <div style=\"background:#0A2452;padding:36px 56px;display:flex;align-items:center;justify-content:space-between\">\n    <div style=\"display:flex;align-items:center;gap:14px\">\n      <svg width=\"36\" height=\"36\" viewBox=\"0 0 100 100\"><polygon points=\"50,5 61.8,38.2 96.6,38.2 68.4,58.8 79.4,92 50,71.4 20.6,92 31.6,58.8 3.4,38.2 38.2,38.2\" fill=\"#4DA3FF\"><\u002Fpolygon><\u002Fsvg>\n      <div style=\"display:flex;flex-direction:column\">\n        <div style=\"font-family:'BricolageSB',sans-serif;font-size:20px;color:#FBFDFF\">Étoile Bleue<\u002Fdiv>\n        <div style=\"font-size:10px;letter-spacing:.22em;color:#7FA8D9\">AMBASSADEURS COMMUNAUTAIRES<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align:right;display:flex;flex-direction:column;gap:4px\">\n      <div style=\"font-size:11px;letter-spacing:.24em;color:#4DA3FF\">FICHE DE CANDIDATURE<\u002Fdiv>\n      <div style=\"font-size:11px;color:#7FA8D9\">{{ refNum }} · {{ dateStr }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:40px 56px 32px;display:flex;flex-direction:column;gap:26px\">\n    <div style=\"display:flex;flex-direction:column;gap:6px;border-bottom:2px solid #0A2452;padding-bottom:18px\">\n      <div style=\"font-family:'BricolageXB',sans-serif;font-size:30px;line-height:1.1;letter-spacing:-.01em\">{{ pdfNom }}<\u002Fdiv>\n      <div style=\"font-size:13px;color:#1C5FB0\">Candidature au programme des Ambassadeurs Communautaires · Coordination opérationnelle · {{ cohorteLabel }}<\u002Fdiv>\n    <\u002Fdiv>\n    <sc-for list=\"{{ pdfSections }}\" as=\"sec\" hint-placeholder-count=\"5\">\n      <div style=\"display:flex;flex-direction:column;gap:2px;break-inside:avoid\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:8px\">\n          <div style=\"width:22px;height:2px;background:#4DA3FF\"><\u002Fdiv>\n          <div style=\"font-size:11px;letter-spacing:.24em;color:#1C5FB0\">{{ sec.titre }}<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ sec.rows }}\" as=\"r\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;gap:18px;padding:7px 0;border-bottom:1px solid rgba(10,36,82,.1)\">\n            <div style=\"width:170px;flex-shrink:0;font-size:11px;letter-spacing:.06em;color:rgba(10,36,82,.55);padding-top:1px;text-transform:uppercase\">{{ r.k }}<\u002Fdiv>\n            <div style=\"flex:1;font-size:13px;line-height:1.55;color:#0A2452;overflow-wrap:anywhere\">{{ r.v }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <div style=\"display:flex;flex-direction:column;gap:10px;background:#FAF8F4;border:1px solid rgba(10,36,82,.15);border-radius:10px;padding:18px 20px;break-inside:avoid\">\n      <div style=\"font-size:11px;letter-spacing:.24em;color:#1C5FB0\">CADRE RÉSERVÉ À L'ÉQUIPE ÉTOILE BLEUE<\u002Fdiv>\n      <div style=\"display:flex;gap:24px\">\n        <div style=\"flex:1;display:flex;flex-direction:column;gap:20px;padding-top:16px\">\n          <div style=\"border-bottom:1px solid rgba(10,36,82,.3);padding-bottom:4px;font-size:10px;color:rgba(10,36,82,.5)\">Avis / observations<\u002Fdiv>\n          <div style=\"border-bottom:1px solid rgba(10,36,82,.3);padding-bottom:4px;font-size:10px;color:rgba(10,36,82,.5)\">&nbsp;<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:180px;display:flex;flex-direction:column;gap:20px;padding-top:16px\">\n          <div style=\"border-bottom:1px solid rgba(10,36,82,.3);padding-bottom:4px;font-size:10px;color:rgba(10,36,82,.5)\">Décision<\u002Fdiv>\n          <div style=\"border-bottom:1px solid rgba(10,36,82,.3);padding-bottom:4px;font-size:10px;color:rgba(10,36,82,.5)\">Date &amp; signature<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;border-top:2px solid #0A2452;padding-top:14px\">\n      <div style=\"font-size:11px;color:rgba(10,36,82,.6)\">Document à envoyer à l'équipe Étoile Bleue via WhatsApp&nbsp;: {{ waDisplay }}<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 100 100\"><polygon points=\"50,5 61.8,38.2 96.6,38.2 68.4,58.8 79.4,92 50,71.4 20.6,92 31.6,58.8 3.4,38.2 38.2,38.2\" fill=\"#1C5FB0\"><\u002Fpolygon><\u002Fsvg>\n        <div style=\"font-size:11px;letter-spacing:.18em;color:#1C5FB0\">ETOILEBLEUE.CD<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;whatsapp&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;+243973470888&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Contact&quot;}, &quot;cohorte&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Cohorte 01 — Kinshasa&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Contact&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.KEY = 'eb-candidature-finale';\n    this.COMMUNES = ['Bandalungwa','Barumbu','Bumbu','Gombe','Kalamu','Kasa-Vubu','Kimbanseke','Kinshasa','Kintambo','Kisenso','Lemba','Limete','Lingwala','Makala','Maluku','Masina','Matete','Mont-Ngafula','Ndjili','Ngaba','Ngaliema','Ngiri-Ngiri','N\\u2019sele','Selembao'];\n    this.LANGUES = ['Français','Lingala','Swahili','Kikongo','Tshiluba','Anglais'];\n    this.RESEAUX = ['Facebook','Instagram','TikTok','X (Twitter)','YouTube','Snapchat','LinkedIn','WhatsApp'];\n    this.AGES = ['Moins de 18 ans','18 – 22 ans','23 – 27 ans','28 – 32 ans','33 – 40 ans','Plus de 40 ans'];\n    this.STATUTS = ['Étudiant(e)','Professionnel(le)','Étudiant(e) et professionnel(le)','Sans activité pour le moment'];\n    this.DOMAINES = ['Création de contenu vidéo','Photographie & couverture d\\u2019événements','Infographie & création visuelle','Gestion des réseaux sociaux','Mobilisation en ligne & community management','Recrutement d\\u2019ambassadeurs','Activités de terrain & sensibilisation de proximité','Organisation d\\u2019événements Étoile Bleue','Sensibilisation dans les universités','Rédaction & storytelling','Animation & prise de parole en public','Logistique & coordination','Formation des ambassadeurs','Relations & partenariats locaux'];\n\n    const defaults = {\n      step: 0, nom: '', age: '', tel: '', email: '', commune: '', langues: [],\n      statut: '', activite: '', reseaux: [], pseudos: {},\n      jours: 0, weekend: '', nuit: '',\n      domaines: [], idees: '',\n      remun: '', montant: '', motivation: '',\n      ref: ''\n    };\n    let saved = {};\n    try {\n      const raw = JSON.parse(localStorage.getItem(this.KEY) || '{}');\n      if (raw && typeof raw === 'object') saved = raw;\n    } catch (e) {}\n    const st = Object.assign({}, defaults);\n    // Merge saved values only if type matches the default (guards against old/corrupt data)\n    Object.keys(defaults).forEach(k => {\n      const d = defaults[k], v = saved[k];\n      if (v === undefined || v === null) return;\n      if (Array.isArray(d) ? Array.isArray(v) : typeof v === typeof d) st[k] = v;\n      if (k === 'montant' && typeof v === 'number') st[k] = String(v);\n    });\n    st.step = Math.min(Math.max(parseInt(st.step, 10) || 0, 0), 6);\n    if (!Array.isArray(st.langues)) st.langues = [];\n    if (!Array.isArray(st.reseaux)) st.reseaux = [];\n    if (!Array.isArray(st.domaines)) st.domaines = [];\n    if (typeof st.pseudos !== 'object' || Array.isArray(st.pseudos)) st.pseudos = {};\n    if (!st.ref) {\n      const n = Math.floor(1000 + Math.random() * 9000);\n      st.ref = 'EB-' + new Date().getFullYear() + '-' + n;\n    }\n    st.tried = false;\n    this.state = st;\n  }\n\n  persist() {\n    try {\n      const s = Object.assign({}, this.state);\n      delete s.tried;\n      localStorage.setItem(this.KEY, JSON.stringify(s));\n    } catch (e) {}\n  }\n  set(k, v) { this.setState({ [k]: v }, () => this.persist()); }\n  toggle(k, val) {\n    const arr = this.state[k];\n    this.set(k, arr.includes(val) ? arr.filter(x => x !== val) : arr.concat(val));\n  }\n  go(step) {\n    this.setState({ step: step, tried: false }, () => {\n      this.persist();\n      try { window.scrollTo({ top: 0, behavior: 'instant' }); } catch (e) { window.scrollTo(0, 0); }\n    });\n  }\n\n  chipStyle(sel) {\n    return {\n      minHeight: '44px', padding: '10px 18px', borderRadius: '999px', cursor: 'pointer',\n      fontFamily: \"'Gotham',sans-serif\", fontSize: '14px', lineHeight: 1.35, textAlign: 'left',\n      background: sel ? '#1C5FB0' : 'transparent',\n      border: sel ? '1px solid #4DA3FF' : '1px solid rgba(127,168,217,.4)',\n      color: sel ? '#FBFDFF' : '#C9D8EE',\n      transition: 'background .15s,border-color .15s,color .15s'\n    };\n  }\n  jourStyle(sel) {\n    return Object.assign(this.chipStyle(sel), { width: '48px', minWidth: '48px', height: '48px', padding: '0', borderRadius: '50%', textAlign: 'center', fontSize: '16px', fontWeight: 700 });\n  }\n\n  telValid() { return (this.state.tel.match(/\\d/g) || []).length >= 9; }\n  emailValid() {\n    const e = this.state.email.trim();\n    return !e || /^[^\\s@]+@[^\\s@]+\\.[^\\s@]{2,}$/.test(e);\n  }\n\n  errors() {\n    const s = this.state;\n    switch (s.step) {\n      case 1: return {\n        nom: !s.nom.trim(), age: !s.age, tel: !this.telValid(),\n        email: !this.emailValid(), commune: !s.commune, langues: !s.langues.length\n      };\n      case 2: return { statut: !s.statut, reseaux: !s.reseaux.length };\n      case 3: return { jours: !s.jours, weekend: !s.weekend, nuit: !s.nuit };\n      case 4: return { domaines: !s.domaines.length };\n      case 5: return { remun: !s.remun, montant: s.remun === 'Oui' && !String(s.montant).trim() };\n      default: return {};\n    }\n  }\n  hasErrors() { const e = this.errors(); return Object.keys(e).some(k => e[k]); }\n\n  ynOpts(field) {\n    return ['Oui', 'Non'].map(l => ({\n      label: l,\n      style: Object.assign(this.chipStyle(this.state[field] === l), { flex: 1, textAlign: 'center' }),\n      onClick: () => this.set(field, l)\n    }));\n  }\n\n  reseauxTexte() {\n    const s = this.state;\n    return s.reseaux.map(r => {\n      const p = (s.pseudos[r] || '').trim();\n      return p ? r + ' (' + p + ')' : r;\n    }).join(' · ');\n  }\n\n  sections(forPdf) {\n    const s = this.state;\n    const dash = '—';\n    const secs = [\n      { titre: 'IDENTITÉ', step: 1, rows: [\n        forPdf ? null : { k: 'Nom', v: s.nom.trim() || dash },\n        { k: 'Âge', v: s.age || dash },\n        { k: 'WhatsApp', v: s.tel.trim() || dash },\n        { k: 'Email', v: s.email.trim() || dash },\n        { k: 'Commune', v: s.commune || dash },\n        { k: 'Langues', v: s.langues.join(' · ') || dash }\n      ].filter(Boolean) },\n      { titre: 'PROFIL & RÉSEAUX', step: 2, rows: [\n        { k: 'Situation', v: s.statut || dash },\n        { k: 'Domaine', v: s.activite.trim() || dash },\n        { k: 'Réseaux', v: this.reseauxTexte() || dash }\n      ] },\n      { titre: 'DISPONIBILITÉ', step: 3, rows: [\n        { k: 'Par semaine', v: s.jours ? s.jours + ' jour' + (s.jours > 1 ? 's' : '') : dash },\n        { k: 'Week-ends', v: s.weekend || dash },\n        { k: 'Nuit', v: s.nuit || dash }\n      ] },\n      { titre: 'CONTRIBUTION', step: 4, rows: [\n        { k: 'Domaines d\\u2019appui', v: s.domaines.join(' · ') || dash },\n        { k: 'Idées proposées', v: s.idees.trim() || dash }\n      ] },\n      { titre: 'RÉMUNÉRATION & MOTIVATION', step: 5, rows: [\n        { k: 'Souhaite être rémunéré(e)', v: s.remun || dash },\n        { k: 'Prétentions', v: s.remun === 'Oui' && String(s.montant).trim() ? String(s.montant).trim() + ' USD / mois' : dash },\n        { k: 'Motivation', v: s.motivation.trim() || dash }\n      ] }\n    ];\n    return secs.map(sec => ({\n      titre: sec.titre,\n      rows: sec.rows,\n      onEdit: () => this.go(sec.step)\n    }));\n  }\n\n  renderVals() {\n    const s = this.state;\n    const wa = this.props.whatsapp ?? '+243973470888';\n    const cohorte = this.props.cohorte ?? 'Cohorte 01 — Kinshasa';\n    const errs = this.errors();\n    const showErr = s.tried;\n    const anyErr = this.hasErrors();\n    const pct = s.step >= 1 ? (s.step / 6) * 100 : 0;\n    const waDigits = wa.replace(/[^0-9]/g, '');\n    const waMsg = 'Bonjour Étoile Bleue, je suis ' + (s.nom.trim() || '…') + '. Ma candidature au programme des Ambassadeurs Communautaires est complète (réf. ' + s.ref + ', ' + (s.commune || 'Kinshasa') + '). Ma fiche PDF est jointe à ce message.';\n    const dateStr = new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });\n    const started = s.nom || s.age || s.tel || s.commune || s.langues.length;\n\n    return {\n      isWelcome: s.step === 0,\n      inForm: s.step >= 1,\n      is1: s.step === 1, is2: s.step === 2, is3: s.step === 3,\n      is4: s.step === 4, is5: s.step === 5, is6: s.step === 6,\n      showNav: s.step >= 1 && s.step <= 5,\n      stepLabel: 'ÉTAPE ' + s.step + ' / 6',\n      barStyle: { height: '100%', width: pct + '%', background: 'linear-gradient(90deg,#1C5FB0,#4DA3FF)', borderRadius: '2px', transition: 'width .3s ease' },\n      cohorteUpper: cohorte.toUpperCase(),\n      cohorteLabel: cohorte,\n      refNum: s.ref,\n      startLabel: started ? 'REPRENDRE MA CANDIDATURE' : 'COMMENCER MA CANDIDATURE',\n\n      start: () => this.go(1),\n      next: () => {\n        if (this.hasErrors()) {\n          this.setState({ tried: true }, () => {\n            const el = document.querySelector('[data-req]');\n            // scroll to first field in error\n            const errKeys = Object.keys(this.errors()).filter(k => this.errors()[k]);\n            if (errKeys.length) {\n              const t = document.querySelector('[data-req=\"' + errKeys[0] + '\"]');\n              if (t) { const y = t.getBoundingClientRect().top + window.pageYOffset - 90; window.scrollTo(0, Math.max(0, y)); }\n            }\n          });\n          return;\n        }\n        this.go(s.step + 1);\n      },\n      back: () => this.go(Math.max(0, s.step - 1)),\n      nextLabel: s.step === 5 ? 'VOIR MON RÉCAPITULATIF' : 'CONTINUER',\n      nextStyle: {\n        width: '100%', minHeight: '56px', border: 0, borderRadius: '999px', cursor: 'pointer',\n        fontFamily: \"'Gotham',sans-serif\", fontSize: '14px', letterSpacing: '.12em', fontWeight: 700,\n        background: (showErr && anyErr) ? 'rgba(251,253,255,.35)' : '#FBFDFF', color: '#0A2452', transition: 'background .2s'\n      },\n      hasError: showErr && anyErr,\n\n      err_nom: showErr && !!errs.nom,\n      err_age: showErr && !!errs.age,\n      err_tel: showErr && !!errs.tel,\n      err_email: showErr && !!errs.email,\n      err_commune: showErr && !!errs.commune,\n      err_langues: showErr && !!errs.langues,\n      err_statut: showErr && !!errs.statut,\n      err_reseaux: showErr && !!errs.reseaux,\n      err_jours: showErr && !!errs.jours,\n      err_weekend: showErr && !!errs.weekend,\n      err_nuit: showErr && !!errs.nuit,\n      err_domaines: showErr && !!errs.domaines,\n      err_remun: showErr && !!errs.remun,\n      err_montant: showErr && !!errs.montant,\n\n      onField: (e) => {\n        const f = e.target.dataset.field;\n        let v = e.target.value;\n        if (f === 'montant') v = v.replace(/[^0-9]/g, '').slice(0, 6);\n        if (f === 'tel') v = v.replace(/[^0-9+ ]/g, '').slice(0, 20);\n        this.set(f, v);\n      },\n      onPseudo: (e) => {\n        const r = e.target.dataset.field;\n        const p = Object.assign({}, this.state.pseudos); p[r] = e.target.value;\n        this.set('pseudos', p);\n      },\n      v_nom: s.nom, v_tel: s.tel, v_email: s.email, v_commune: s.commune,\n      v_activite: s.activite, v_idees: s.idees, v_montant: s.montant, v_motivation: s.motivation,\n\n      communeOptions: [React.createElement('option', { key: '_', value: '' }, 'Choisis ta commune…')].concat(this.COMMUNES.map(c => React.createElement('option', { key: c, value: c }, c))),\n      ageOpts: this.AGES.map(a => ({ label: a, style: this.chipStyle(s.age === a), onClick: () => this.set('age', a) })),\n      langueOpts: this.LANGUES.map(l => ({ label: l, style: this.chipStyle(s.langues.includes(l)), onClick: () => this.toggle('langues', l) })),\n      statutOpts: this.STATUTS.map(t => ({ label: t, style: this.chipStyle(s.statut === t), onClick: () => this.set('statut', t) })),\n      reseauOpts: this.RESEAUX.map(r => ({ label: r, style: this.chipStyle(s.reseaux.includes(r)), onClick: () => this.toggle('reseaux', r) })),\n      domaineOpts: this.DOMAINES.map(d => ({ label: d, style: this.chipStyle(s.domaines.includes(d)), onClick: () => this.toggle('domaines', d) })),\n      jourOpts: [1, 2, 3, 4, 5, 6, 7].map(n => ({ label: String(n), style: this.jourStyle(s.jours === n), onClick: () => this.set('jours', n) })),\n      jourHint: s.jours ? 'Disponible ' + s.jours + ' jour' + (s.jours > 1 ? 's' : '') + ' par semaine.' : 'Touche un chiffre, de 1 à 7 jours.',\n      weekendOpts: this.ynOpts('weekend'),\n      nuitOpts: this.ynOpts('nuit'),\n      remunOpts: this.ynOpts('remun'),\n      showMontant: s.remun === 'Oui',\n      hasPseudos: s.reseaux.length > 0,\n      pseudoRows: s.reseaux.map(r => ({ label: r, field: r, value: s.pseudos[r] || '' })),\n\n      recapSections: this.sections(false),\n      pdfSections: this.sections(true),\n      pdfNom: s.nom.trim() || 'Candidat(e)',\n      dateStr: dateStr,\n      doPrint: () => { setTimeout(() => window.print(), 50); },\n      resetAll: () => {\n        if (!window.confirm('Effacer toutes tes réponses et recommencer à zéro ?')) return;\n        try { localStorage.removeItem(this.KEY); } catch (e) {}\n        const n = Math.floor(1000 + Math.random() * 9000);\n        this.setState({\n          step: 0, nom: '', age: '', tel: '', email: '', commune: '', langues: [],\n          statut: '', activite: '', reseaux: [], pseudos: {},\n          jours: 0, weekend: '', nuit: '',\n          domaines: [], idees: '',\n          remun: '', montant: '', motivation: '',\n          ref: 'EB-' + new Date().getFullYear() + '-' + n, tried: false\n        }, () => this.persist());\n      },\n      waHref: 'https://wa.me/' + waDigits + '?text=' + encodeURIComponent(waMsg),\n      waDisplay: wa\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
