# ── Netlify · Étoile Bleue — page « Bientôt » uniquement ─────────────────────
# Seul le dossier dist/ est publié : rien d'autre n'est accessible en ligne.
[build]
  publish = "dist"

# En-têtes de sécurité globaux
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# HTML toujours frais
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Toute URL (même devinée) → la page « Bientôt ». Aucune autre page n'existe.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
